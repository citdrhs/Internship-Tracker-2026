{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="register_card">
        <h2>Register</h2>

        <form class="register_form" method="POST" action="#" onsubmit="return false;">
            
            <div class="form-group">
                <label for="role">Register As</label>
                <select id="role" name="role" onchange="toggleAccessCode()">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="mentor">Mentor</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="organization">Organization</label>
                <input type="organization" id="organization" name="organization" required>
            </div>

            <div class="form-group">
                <label for="first_name">First name</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>

            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="confirmPassword" id="confirmPassword" name="confirmPassword" required>
            </div>

            <div class="form-group" id="access-code-group" style="display: none;">
                <label for="access_code">Access Code</label>
                <input type="text" id="access_code" name="access_code">
            </div>

            <button type="submit" class="btn">Register</button>
        </form>
    </div>
    
</div>

{% endblock %}
